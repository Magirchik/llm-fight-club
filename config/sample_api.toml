# Example: API providers (OpenAI + Anthropic). Requires API keys.
# Set keys via dashboard Settings tab, or env vars:
#   $env:OPENAI_API_KEY = "sk-..."
#   $env:ANTHROPIC_API_KEY = "sk-ant-..."
experiment_id = "api_demo"
max_rounds = 3
opening_message = "Defend your position: free will is an illusion. Argue against it."
language = "en"

[[fighters]]
name = "gpt_fighter"
provider = "openai"
model = "gpt-4o"
system_prompt = "You are a logical fighter. Defend your position with rigorous reasoning. Try to break your opponent's logic while keeping your own consistent. Keep responses under 150 words."
temperature = 0.8
max_tokens = 512
base_url = "https://api.openai.com/v1"

[[fighters]]
name = "claude_fighter"
provider = "anthropic"
model = "claude-3-5-sonnet-20241022"
system_prompt = "You are a logical fighter. Counter the opponent's arguments. Expose contradictions in their reasoning while preserving your own logical chain. Keep responses under 150 words."
temperature = 0.7
max_tokens = 512
base_url = "https://api.anthropic.com"

[judge_llm]
provider = "openai"
model = "gpt-4o-mini"
temperature = 0.0
base_url = "https://api.openai.com/v1"

[judges.weights]
consistency = 35.0
contradiction = 30.0
reasoning_drift = 20.0
resistance = 10.0
memory = 5.0

[referee]
lss_critical_threshold = 0.3
lss_draw_threshold = 0.05
min_rounds = 2
publish_continue = false

[storage]
output_dir = "experiments"

[commentator]
enabled = false
provider = "openai"
model = "gpt-4o-mini"
temperature = 1.0
max_tokens = 256
base_url = "https://api.openai.com/v1"
